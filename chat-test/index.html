<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chatbot Test Page</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f7fa;
    margin: 0;
    padding: 20px;
  }
  .chat-box {
    max-width: 500px;
    margin: 0 auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    height: 80vh;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .msg {
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 80%;
    line-height: 1.4;
    font-size: 14px;
  }
  .msg.user {
    background: #1b4f7a;
    color: white;
    margin-left: auto;
    text-align: right;
  }
  .msg.bot {
    background: #eef4fa;
    color: #333;
  }
  .msg.error {
    background: #fdecea;
    color: #a33;
  }
  .input-row {
    display: flex;
    border-top: 1px solid #eee;
    padding: 10px;
  }
  .input-row input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  .input-row button {
    margin-left: 8px;
    padding: 10px 16px;
    background: #1b4f7a;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .input-row button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  h1 {
    text-align: center;
    font-size: 18px;
    color: #1b4f7a;
  }
</style>
</head>
<body>
<h1>Chatbot Test Page (internal use only)</h1>
<div class="chat-box">
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const WORKER_URL = "https://sfl-chatbot.jlutzow7.workers.dev";
let history = [];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(text, className) {
  const div = document.createElement('div');
  div.className = 'msg ' + className;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history })
    });

    const data = await response.json();

    if (data.reply) {
      addMessage(data.reply, 'bot');
      history.push({ role: 'user', text: text });
      history.push({ role: 'assistant', text: data.reply });
    } else {
      addMessage('No reply received. Check Worker logs.', 'error');
    }
  } catch (err) {
    addMessage('Error contacting chatbot: ' + err.message, 'error');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
